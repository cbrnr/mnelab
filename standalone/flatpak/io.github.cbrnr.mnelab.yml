app-id: io.github.cbrnr.mnelab

runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk

command: mnelab

finish-args:
  # X11 / Wayland display access
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # GPU acceleration (matplotlib, Qt)
  - --device=dri
  # Read/write access to the user's home directory for opening/saving files
  - --filesystem=home
  # Allow Qt to read the desktop color scheme via xdg-desktop-portal
  - --env=QT_QPA_PLATFORMTHEME=xdgdesktopportal

modules:

  # ─────────────────────────────────────────────────────────────────────────
  # 1. PySide6
  #
  #    Handled separately because flatpak-pip-generator constructs wrong PyPI
  #    API URLs for packages with underscores (pyside6_essentials,
  #    pyside6_addons, shiboken6) — the tool uses underscores but the PyPI
  #    JSON API expects hyphens.  Pin is set to the version pip resolves inside
  #    the SDK sandbox; update PYSIDE6_VERSION in generate-pip-sources.sh when
  #    upgrading PySide6.
  # ─────────────────────────────────────────────────────────────────────────
  - python3-pyside6.json

  # ─────────────────────────────────────────────────────────────────────────
  # 2. All other Python dependencies
  #
  #    python3-mnelab-deps.json is generated by flatpak-pip-generator
  #    (see generate-pip-sources.sh).  The generated JSON is a self-contained
  #    module definition: it declares every wheel as a source and installs
  #    them offline via pip using --find-links.  Run the script once per
  #    release and commit the resulting JSON file.
  # ─────────────────────────────────────────────────────────────────────────
  - python3-mnelab-deps.json

  # ─────────────────────────────────────────────────────────────────────────
  # 3. MNELAB itself
  #
  #    Uses a local directory source for testing.  Switch to the git source
  #    (update `tag` and `commit`) when submitting to Flathub.
  # ─────────────────────────────────────────────────────────────────────────
  - name: mnelab
    buildsystem: simple
    build-commands:
      # Install mnelab (all deps already installed by the previous module)
      - pip3 install --prefix=/app --no-deps --no-build-isolation .
      # Desktop entry
      - install -Dm644 packaging/io.github.cbrnr.mnelab.desktop
          /app/share/applications/io.github.cbrnr.mnelab.desktop
      # AppStream metadata
      - install -Dm644 packaging/io.github.cbrnr.mnelab.metainfo.xml
          /app/share/metainfo/io.github.cbrnr.mnelab.metainfo.xml
      # Scalable icon
      - install -Dm644 src/mnelab/icons/mnelab-logo.svg
          /app/share/icons/hicolor/scalable/apps/io.github.cbrnr.mnelab.svg
    sources:
      # ── Local checkout (for testing) ─────────────────────────────────────
      - type: dir
        path: ../..      
      # ── Tagged release (for Flathub) — uncomment and remove dir source ───
      # - type: git
      #   url: https://github.com/cbrnr/mnelab.git
      #   tag: v1.4.0          # update to the release tag
      #   commit: REPLACE_ME   # git rev-parse v1.4.0^{}
      # ── Support files (desktop entry + metainfo) ─────────────────────────
      - type: file
        path: io.github.cbrnr.mnelab.desktop
        dest: packaging
      - type: file
        path: io.github.cbrnr.mnelab.metainfo.xml
        dest: packaging
